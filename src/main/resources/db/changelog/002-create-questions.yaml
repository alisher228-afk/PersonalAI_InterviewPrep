databaseChangeLog:
  - changeSet:
      id: 002-create-questions
      author: akusher
      changes:
        - createTable:
            tableName: questions
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
              - column:
                  name: topic_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: question_text
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: difficulty
                  type: VARCHAR(20)
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: questions
            baseColumnNames: topic_id
            referencedTableName: topics
            referencedColumnNames: id
            onDelete: CASCADE